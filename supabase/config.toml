# For detailed configuration reference documentation, visit:
# https://supabase.com/docs/guides/local-development/cli/config

project_id = "my-clup"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
health_timeout = "2m"
major_version = 17

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = false
sql_paths = []

[realtime]
enabled = true

[studio]
enabled = false
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = false
port = 54324

[storage]
enabled = false
file_size_limit = "50MiB"

[storage.s3_protocol]
enabled = false

[auth]
enabled = true
site_url = "http://127.0.0.1:3001"
additional_redirect_urls = [
  "http://localhost:3001",
  "http://127.0.0.1:3001",
  "exp://127.0.0.1:8081",
  "exp://localhost:8081"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8
password_requirements = "lower_upper_letters_digits_symbols"

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

[auth.sms]
enable_signup = false
enable_confirmations = false
template = "Your code is {{ .Code }}"
max_frequency = "5s"

[edge_runtime]
enabled = false
policy = "per_worker"
inspector_port = 8083
deno_version = 2

[analytics]
enabled = false
port = 54327
backend = "postgres"
